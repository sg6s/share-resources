name: Resources Sharing

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 10 *'

permissions:
  contents: write

env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

jobs:
  build:
    name: Sync to Aliyun
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Sync Images
      run: |
        echo "$ALIYUN_REGISTRY_PASSWORD" | docker login -u $ALIYUN_REGISTRY_USER --password-stdin $ALIYUN_REGISTRY
        
        while IFS= read -r line; do
            [[ -z "$line" ]] || [[ "$line" =~ ^\s*# ]] && continue
            
            echo "拉取镜像: $line"
            docker pull $line
            
            image=$(echo "$line" | awk '{print $NF}' | sed 's/@.*//')
            platform=$(echo "$line" | awk -F'--platform[ =]' '{if (NF>1) print $2}' | awk '{print $1}')
            image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
            name_space=$(echo "$image" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
            
            # 清理名称中的无效字符
            platform_prefix=""
            [[ -n "$platform" ]] && platform_prefix="${platform//\//_}_"
            
            name_space_prefix=""
            [[ -n "$name_space" ]] && name_space_prefix="${name_space}_"
            
            # 构建安全的镜像名称
            safe_image_name=$(echo "${platform_prefix}${name_space_prefix}${image_name_tag}" | sed 's/[^a-zA-Z0-9._-]/_/g')
            new_image="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/$safe_image_name"
            
            echo "推送到: $new_image"
            docker tag $image $new_image
            docker push $new_image
            docker rmi $image $new_image
            
        done < resources.list

  resources-download:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Download Images
      run: |
        mkdir -p docker-images
        echo "$ALIYUN_REGISTRY_PASSWORD" | docker login -u $ALIYUN_REGISTRY_USER --password-stdin $ALIYUN_REGISTRY
        
        while IFS= read -r line; do
            [[ -z "$line" ]] || [[ "$line" =~ ^\s*# ]] && continue
            
            image=$(echo "$line" | awk '{print $NF}' | sed 's/@.*//')
            platform=$(echo "$line" | awk -F'--platform[ =]' '{if (NF>1) print $2}' | awk '{print $1}')
            image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
            name_space=$(echo "$image" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
            
            platform_prefix=""
            [[ -n "$platform" ]] && platform_prefix="${platform//\//_}_"
            
            name_space_prefix=""
            [[ -n "$name_space" ]] && name_space_prefix="${name_space}_"
            
            # 构建安全的镜像名称（与上传时一致）
            safe_image_name=$(echo "${platform_prefix}${name_space_prefix}${image_name_tag}" | sed 's/[^a-zA-Z0-9._-]/_/g')
            aliyun_image="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/$safe_image_name"
            
            echo "下载: $aliyun_image"
            docker pull $aliyun_image
            
            safe_filename=$(echo "$safe_image_name" | sed 's|/|_|g; s|:|_|g')
            docker save $aliyun_image | gzip > "docker-images/${safe_filename}.tar.gz"
            docker rmi $aliyun_image
            
        done < resources.list

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: docker-images/*.tar.gz
        tag_name: latest
